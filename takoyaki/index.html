<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#FFD6E8">
    <title>Takoyaki Master</title>
    <link rel="stylesheet" href="./css/main.css">
  </head>
  <body class="theme-cute-pink" data-screen="main-menu" data-lang="zh-TW">
    <div id="app-shell" class="app-shell">
      <main id="screen-stack" class="screen-stack" aria-live="polite">
        <section id="screen-main-menu" class="screen" data-screen-panel="main-menu"></section>
        <section id="screen-game" class="screen" data-screen-panel="game"></section>
        <section id="screen-howto" class="screen" data-screen-panel="howto"></section>
        <section id="screen-settings" class="screen" data-screen-panel="settings"></section>
      </main>
      <div id="modal-root" class="modal-root" aria-live="assertive"></div>
    </div>
    <script src="./js/app.js"></script>
  </body>
</html>
