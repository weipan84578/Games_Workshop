<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Garden Defenders</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <section id="mainMenu" class="screen menu-screen active">
      <div class="menu-hill"></div>
      <div class="menu-plant" aria-hidden="true">
        <svg viewBox="0 0 120 140" width="100%" height="100%">
          <ellipse cx="60" cy="124" rx="38" ry="10" fill="rgba(0,0,0,.2)"/>
          <path d="M58 108 C48 88 50 70 61 52 C72 72 74 91 63 110" fill="#2e7d32"/>
          <circle cx="61" cy="48" r="28" fill="#69c34a" stroke="#2e7d32" stroke-width="6"/>
          <circle cx="52" cy="42" r="4" fill="#1c3a14"/><circle cx="70" cy="42" r="4" fill="#1c3a14"/>
          <path d="M50 57 Q61 66 74 57" fill="none" stroke="#1c3a14" stroke-width="4" stroke-linecap="round"/>
          <ellipse cx="32" cy="86" rx="22" ry="10" fill="#4caf50" transform="rotate(-28 32 86)"/>
          <ellipse cx="88" cy="84" rx="22" ry="10" fill="#4caf50" transform="rotate(26 88 84)"/>
        </svg>
      </div>
      <div class="menu-zombie" aria-hidden="true">
        <svg viewBox="0 0 120 150" width="100%" height="100%">
          <ellipse cx="61" cy="137" rx="37" ry="9" fill="rgba(0,0,0,.22)"/>
          <rect x="40" y="62" width="42" height="58" rx="8" fill="#6b7280"/>
          <circle cx="61" cy="43" r="28" fill="#b8c99a" stroke="#6f8452" stroke-width="5"/>
          <circle cx="51" cy="38" r="5" fill="#263315"/><circle cx="72" cy="39" r="4" fill="#263315"/>
          <path d="M49 55 L75 56" stroke="#263315" stroke-width="4" stroke-linecap="round"/>
          <path d="M43 118 L34 139 M77 118 L88 139" stroke="#394150" stroke-width="10" stroke-linecap="round"/>
          <path d="M40 76 L19 95 M83 75 L101 94" stroke="#b8c99a" stroke-width="9" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="panel">
        <h1 class="game-title">Garden Defenders</h1>
        <p class="subtitle">種下防線，守住五條草坪</p>
        <button class="game-btn" id="newGameBtn">開始遊戲</button>
        <button class="game-btn secondary" id="continueBtn">繼續遊戲</button>
        <button class="game-btn secondary" id="practiceBtn">練習</button>
        <button class="game-btn secondary" id="encyclopediaBtn">圖鑑</button>
        <button class="game-btn secondary" id="settingsBtn">音效設定</button>
      </div>
    </section>

    <section id="plantSelect" class="screen plant-select-screen">
      <div class="select-wrap">
        <h2 class="select-title" id="selectTitle">選擇 6 種植物</h2>
        <div style="display:flex;justify-content:center;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px;">
          <button class="icon-btn" id="prevLevelBtn" title="上一關">‹</button>
          <div class="wave-label" id="selectLevelLabel" style="color:#213916;text-shadow:0 1px rgba(255,255,255,.6);">Level 1 / 50</div>
          <select class="level-select" id="levelJumpSelect" aria-label="選擇關卡"></select>
          <button class="icon-btn" id="nextLevelSelectBtn" title="下一關">›</button>
        </div>
        <div id="plantList" class="plant-list"></div>
        <div class="chosen-list" id="chosenList"></div>
        <button class="game-btn" id="startBattleBtn">進入草坪</button>
        <button class="game-btn secondary" id="backMenuBtn">返回</button>
      </div>
    </section>

    <section id="gameScreen" class="screen game-screen">
      <header class="hud">
        <div class="sun-count"><span>☀</span><span id="sunCount">150</span></div>
        <div id="plantHand" class="plant-hand"></div>
        <button class="icon-btn" id="shovelBtn" title="鏟子">♨</button>
        <button class="toggle-btn" id="autoSunBtn" title="自動採集陽光">自動陽光 OFF</button>
        <div class="hud-spacer"></div>
        <div class="timer" id="timer">00:00</div>
        <div class="wave-label" id="waveLabel">Wave 0/5</div>
        <button class="icon-btn" id="pauseBtn" title="暫停">Ⅱ</button>
      </header>
      <main class="playfield-shell">
        <div class="playfield" id="playfield">
          <div class="board" id="board"></div>
          <div id="laneLayer"></div>
          <div class="entity-layer" id="entityLayer"></div>
          <div class="ghost" id="ghost"></div>
        </div>
      </main>
      <div class="toast" id="toast"></div>
    </section>

    <div class="overlay" id="pauseOverlay">
      <div class="dialog">
        <h2>遊戲暫停</h2>
        <button class="game-btn" id="resumeBtn">繼續遊戲</button>
        <button class="game-btn secondary" id="restartBtn">重新開始</button>
        <button class="game-btn secondary" id="quitBtn">回主選單</button>
      </div>
    </div>

    <div class="overlay" id="resultOverlay">
      <div class="dialog">
        <h2 id="resultTitle">勝利</h2>
        <div class="stats">
          <div>時間 <span id="statTime">00:00</span></div>
          <div>分數 <span id="statScore">0</span></div>
          <div>擊倒 <span id="statKills">0</span></div>
          <div>波次 <span id="statWave">0</span></div>
        </div>
        <button class="game-btn" id="againBtn">再玩一次</button>
        <button class="game-btn" id="nextLevelBtn">下一關</button>
        <button class="game-btn secondary" id="resultMenuBtn">回主選單</button>
      </div>
    </div>

    <div class="overlay" id="settingsOverlay">
      <div class="dialog">
        <h2>音效設定</h2>
        <label class="settings-row">主音量 <input id="masterVolume" type="range" min="0" max="1" step="0.01"></label>
        <label class="settings-row">音樂 <input id="musicVolume" type="range" min="0" max="1" step="0.01"></label>
        <label class="settings-row">音效 <input id="sfxVolume" type="range" min="0" max="1" step="0.01"></label>
        <label class="settings-row">震動 <input id="vibrationToggle" type="checkbox"></label>
        <button class="game-btn" id="closeSettingsBtn">完成</button>
      </div>
    </div>

    <div class="overlay" id="encyclopediaOverlay">
      <div class="dialog encyclopedia-dialog">
        <div class="encyclopedia-head">
          <h2>圖鑑</h2>
          <button class="icon-btn" id="closeEncyclopediaBtn" title="關閉">×</button>
        </div>
        <div class="encyclopedia-tabs">
          <button class="tab-btn active" id="plantCodexTab">植物</button>
          <button class="tab-btn" id="zombieCodexTab">殭屍與敵人</button>
        </div>
        <div class="encyclopedia-grid" id="encyclopediaGrid"></div>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/save-system.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/state.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/game-systems.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
