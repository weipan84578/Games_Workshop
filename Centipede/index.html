<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a14">
  <title>Centipede Web</title>
  <link rel="stylesheet" href="css/base/reset.css">
  <link rel="stylesheet" href="css/base/variables.css">
  <link rel="stylesheet" href="css/base/typography.css">
  <link rel="stylesheet" href="css/layout/layout.css">
  <link rel="stylesheet" href="css/components/menu.css">
  <link rel="stylesheet" href="css/components/hud.css">
  <link rel="stylesheet" href="css/components/modal.css">
  <link rel="stylesheet" href="css/components/controls.css">
  <link rel="stylesheet" href="css/components/settings.css">
  <link rel="stylesheet" href="css/themes/theme-neon.css">
  <link rel="stylesheet" href="css/themes/theme-retro.css">
  <link rel="stylesheet" href="css/themes/theme-ocean.css">
  <link rel="stylesheet" href="css/themes/theme-sunset.css">
  <link rel="stylesheet" href="css/themes/theme-mono.css">
  <link rel="stylesheet" href="css/layout/responsive.css">
</head>
<body data-theme="neon" data-font-size="normal">
  <main id="app" class="app" aria-label="Centipede Web Game">
    <header class="hud" id="hud">
      <div class="hud__group">
        <span class="hud__label">SCORE</span>
        <strong id="hudScore">0</strong>
      </div>
      <div class="hud__group">
        <span class="hud__label">HIGH</span>
        <strong id="hudHigh">0</strong>
      </div>
      <div class="hud__group">
        <span class="hud__label">LIVES</span>
        <strong id="hudLives">3</strong>
      </div>
      <div class="hud__group">
        <span class="hud__label">LEVEL</span>
        <strong id="hudLevel">1</strong>
      </div>
      <div class="hud__actions">
        <button class="icon-button" id="pauseBtn" type="button" aria-label="暫停" title="暫停">
          <span class="control-icon control-icon--pause" aria-hidden="true"></span>
        </button>
        <button class="icon-button" id="settingsBtn" type="button" aria-label="設定" title="設定">
          <span class="control-icon control-icon--gear" aria-hidden="true"></span>
        </button>
      </div>
    </header>

    <section class="game-shell" aria-label="遊戲區">
      <div class="stage-wrap" id="stageWrap">
        <canvas id="gameCanvas" width="600" height="720" aria-label="Centipede 遊戲畫布"></canvas>
        <div class="status-ribbon" id="statusRibbon" hidden></div>
      </div>
    </section>

    <section class="touch-controls" id="touchControls" aria-label="觸控控制">
      <div class="stick" id="touchStick" aria-label="移動搖桿">
        <span class="stick__nub" id="touchNub"></span>
      </div>
      <button class="fire-button" id="touchFire" type="button" aria-label="射擊">射擊</button>
    </section>

    <section class="screen screen--menu is-active" id="menuScreen" aria-label="主選單">
      <div class="menu-panel">
        <p class="eyebrow">ARCADE FIELD</p>
        <div class="menu-scene" aria-hidden="true">
          <span class="menu-centipede menu-centipede--a"></span>
          <span class="menu-centipede menu-centipede--b"></span>
          <span class="menu-mushroom menu-mushroom--a"></span>
          <span class="menu-mushroom menu-mushroom--b"></span>
          <span class="menu-shooter"></span>
        </div>
        <h1>CENTIPEDE</h1>
        <div class="menu-actions" role="menu">
          <button type="button" class="menu-button is-selected" data-action="new">開始新遊戲</button>
          <button type="button" class="menu-button" data-action="continue">繼續遊戲</button>
          <button type="button" class="menu-button" data-action="help">操作說明</button>
          <button type="button" class="menu-button" data-action="settings">設定</button>
        </div>
        <p class="menu-note" id="saveStatus">尚未偵測到可繼續的存檔</p>
      </div>
    </section>

    <section class="modal" id="modal" aria-modal="true" role="dialog" hidden>
      <div class="modal__panel">
        <header class="modal__header">
          <h2 id="modalTitle">訊息</h2>
          <button type="button" class="icon-button" id="modalClose" aria-label="關閉">X</button>
        </header>
        <div class="modal__body" id="modalBody"></div>
        <footer class="modal__actions" id="modalActions"></footer>
      </div>
    </section>

    <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>
  </main>

  <script src="js/utils/helpers.js"></script>
  <script src="js/utils/storage.js"></script>
  <script src="js/core/config.js"></script>
  <script src="js/systems/collision.js"></script>
  <script src="js/systems/score.js"></script>
  <script src="js/systems/level.js"></script>
  <script src="js/systems/particles.js"></script>
  <script src="js/systems/spawner.js"></script>
  <script src="js/entities/mushroom.js"></script>
  <script src="js/entities/bullet.js"></script>
  <script src="js/entities/shooter.js"></script>
  <script src="js/entities/centipede.js"></script>
  <script src="js/entities/spider.js"></script>
  <script src="js/entities/flea.js"></script>
  <script src="js/entities/scorpion.js"></script>
  <script src="js/audio/audioEngine.js"></script>
  <script src="js/audio/sfx.js"></script>
  <script src="js/audio/music.js"></script>
  <script src="js/input/keyboard.js"></script>
  <script src="js/input/mouse.js"></script>
  <script src="js/input/touch.js"></script>
  <script src="js/ui/modal.js"></script>
  <script src="js/ui/hud.js"></script>
  <script src="js/ui/settings.js"></script>
  <script src="js/ui/menu.js"></script>
  <script src="js/core/stateMachine.js"></script>
  <script src="js/core/gameLoop.js"></script>
  <script src="js/core/main.js"></script>
</body>
</html>
