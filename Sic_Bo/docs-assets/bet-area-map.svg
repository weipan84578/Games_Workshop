  <title id="title">Sic Bo betting area map</title>
  <desc id="desc">A stylized Sic Bo table map showing basic bets, totals, singles, doubles, triples, and combinations.</desc>
  <rect width="960" height="520" rx="18" fill="#145f42"/>
  <rect x="28" y="28" width="904" height="464" rx="14" fill="none" stroke="#e8cc78" stroke-width="8"/>
