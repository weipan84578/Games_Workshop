<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>霓虹彈珠台</title>
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/screen-menu.css" />
  <link rel="stylesheet" href="css/screen-game.css" />
  <link rel="stylesheet" href="css/screen-help.css" />
  <link rel="stylesheet" href="css/screen-settings.css" />
  <link rel="stylesheet" href="css/themes.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body data-theme="neon">
  <main id="app" class="app-shell">
    <section id="screen-menu" class="screen screen-menu is-active" aria-labelledby="menu-title">
      <div class="menu-layout">
        <div class="brand-panel">
          <p class="eyebrow">靜態網頁版</p>
          <h1 id="menu-title">霓虹彈珠台</h1>
          <div class="score-strip" aria-live="polite">
            <span>最高分</span>
            <strong id="menu-high-score">0</strong>
          </div>
          <div class="menu-actions">
            <button id="btn-start" class="button button-primary" type="button">開始</button>
            <button id="btn-continue" class="button" type="button">繼續</button>
            <button id="btn-help" class="button" type="button">說明</button>
            <button id="btn-settings" class="button" type="button">設定</button>
          </div>
        </div>
        <div class="attract-panel" aria-hidden="true">
          <canvas id="attract-canvas" width="270" height="480"></canvas>
        </div>
      </div>
    </section>

    <section id="screen-game" class="screen screen-game" aria-label="彈珠台遊戲">
      <div class="game-layout">
        <aside class="hud-panel" aria-live="polite">
          <div class="hud-grid">
            <div class="hud-item">
              <span>分數</span>
              <strong id="hud-score">0</strong>
            </div>
            <div class="hud-item">
              <span>球數</span>
              <strong id="hud-balls">3</strong>
            </div>
            <div class="hud-item">
              <span>倍率</span>
              <strong id="hud-multiplier">x1</strong>
            </div>
            <div class="hud-item">
              <span>連擊</span>
              <strong id="hud-combo">0</strong>
            </div>
          </div>
          <div id="hud-message" class="hud-message">準備</div>
          <div class="game-buttons">
            <button id="btn-pause" class="icon-button" type="button" aria-label="暫停">Ⅱ</button>
            <button id="btn-back-menu" class="icon-button" type="button" aria-label="返回主選單">⌂</button>
          </div>
        </aside>

        <div class="board-wrap">
          <canvas id="board" width="540" height="960"></canvas>
          <div id="pause-overlay" class="pause-overlay" hidden>
            <div class="pause-panel">
              <h2>暫停</h2>
              <button id="btn-resume" class="button button-primary" type="button">繼續</button>
              <button id="btn-save-exit" class="button" type="button">保存離開</button>
              <button id="btn-restart" class="button" type="button">重開</button>
            </div>
          </div>
        </div>

        <div class="touch-controls" aria-hidden="true">
          <button id="touch-left" type="button">左</button>
          <button id="touch-launch" type="button">發射</button>
          <button id="touch-right" type="button">右</button>
        </div>
      </div>
    </section>

    <section id="screen-help" class="screen screen-help" aria-labelledby="help-title">
      <div class="content-shell">
        <header class="screen-header">
          <button class="icon-button js-back-menu" type="button" aria-label="返回主選單">⌂</button>
          <h2 id="help-title">說明</h2>
        </header>
        <div class="info-grid">
          <article class="info-card">
            <h3>操作</h3>
            <p>左彈板：A / ←。右彈板：D / →。發射：長按 Space / ↓ 後放開。暫停：Esc。</p>
          </article>
          <article class="info-card">
            <h3>得分</h3>
            <p>彈柱 100 分，目標 250 分，坡道 500 分。連續命中會提高連擊與倍率。</p>
          </article>
          <article class="info-card">
            <h3>規則</h3>
            <p>每局 3 顆球。發射太弱會回到發射器重射；只有進入主場後才會扣球。</p>
          </article>
        </div>
      </div>
    </section>

    <section id="screen-settings" class="screen screen-settings" aria-labelledby="settings-title">
      <div class="content-shell">
        <header class="screen-header">
          <button class="icon-button js-back-menu" type="button" aria-label="返回主選單">⌂</button>
          <h2 id="settings-title">設定</h2>
        </header>
        <form id="settings-form" class="settings-form">
          <fieldset>
            <legend>主題</legend>
            <div class="theme-picker" role="radiogroup" aria-label="主題">
              <button type="button" class="theme-swatch" data-theme-choice="neon" aria-label="霓虹" style="--swatch-a:#ff2d95;--swatch-b:#00e5ff;--swatch-c:#faff00"></button>
              <button type="button" class="theme-swatch" data-theme-choice="classic" aria-label="經典" style="--swatch-a:#e63946;--swatch-b:#ffb703;--swatch-c:#fefae0"></button>
              <button type="button" class="theme-swatch" data-theme-choice="ocean" aria-label="海洋" style="--swatch-a:#00b4d8;--swatch-b:#caf0f8;--swatch-c:#48cae4"></button>
              <button type="button" class="theme-swatch" data-theme-choice="forest" aria-label="森林" style="--swatch-a:#2d6a4f;--swatch-b:#d8f3dc;--swatch-c:#fca311"></button>
              <button type="button" class="theme-swatch" data-theme-choice="sunset" aria-label="夕陽" style="--swatch-a:#ff006e;--swatch-b:#ffbe0b;--swatch-c:#3a86ff"></button>
              <button type="button" class="theme-swatch" data-theme-choice="mono" aria-label="單色" style="--swatch-a:#ffffff;--swatch-b:#999999;--swatch-c:#ffd60a"></button>
            </div>
          </fieldset>

          <fieldset>
            <legend>音量</legend>
            <label class="range-row">
              <span>BGM</span>
              <input id="setting-bgm" type="range" min="0" max="100" step="1" />
              <output id="setting-bgm-value">45%</output>
            </label>
            <label class="range-row">
              <span>音效</span>
              <input id="setting-sfx" type="range" min="0" max="100" step="1" />
              <output id="setting-sfx-value">80%</output>
            </label>
            <label class="toggle-row">
              <span>靜音</span>
              <input id="setting-muted" type="checkbox" />
            </label>
          </fieldset>

          <fieldset>
            <legend>遊戲</legend>
            <div class="segmented" role="radiogroup" aria-label="難度">
              <button type="button" data-difficulty="easy">簡單</button>
              <button type="button" data-difficulty="normal">普通</button>
              <button type="button" data-difficulty="hard">困難</button>
            </div>
          </fieldset>

          <div class="settings-actions">
            <button id="btn-reset-storage" class="button" type="button">清除紀錄</button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/audio/audio-manager.js"></script>
  <script src="js/audio/sound-effects.js"></script>
  <script src="js/core/game-loop.js"></script>
  <script src="js/core/physics.js"></script>
  <script src="js/core/collision.js"></script>
  <script src="js/core/renderer.js"></script>
  <script src="js/entities/ball.js"></script>
  <script src="js/entities/flipper.js"></script>
  <script src="js/entities/bumper.js"></script>
  <script src="js/entities/target.js"></script>
  <script src="js/entities/plunger.js"></script>
  <script src="js/entities/wall.js"></script>
  <script src="js/ui/screen-manager.js"></script>
  <script src="js/ui/menu.js"></script>
  <script src="js/ui/hud.js"></script>
  <script src="js/ui/settings.js"></script>
  <script src="js/ui/input.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
