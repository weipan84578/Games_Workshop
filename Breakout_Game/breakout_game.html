<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>BRICKSTORM</title>
<link rel="stylesheet" href="css/base.css" />
<link rel="stylesheet" href="css/layout.css" />
<link rel="stylesheet" href="css/components.css" />
<link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
<div id="app"><div class="shell">
  <div class="logo">BRICKSTORM<small>STORM</small></div>
  <section class="panel">
    <div id="loading" class="screen active"><p class="desc">INITIALIZING...</p></div>
    <div id="menu" class="screen">
      <p class="desc">霓虹風格 Breakout。50 關、道具、排行榜與本機存檔都已就位。</p>
      <div class="menu">
        <button data-go="select">開始遊戲</button><button data-go="settings">設定</button><button data-go="leaderboard">排行榜</button>
      </div>
      <div class="footer-note">← → / A D 移動，Space 發球，P 暫停</div>
    </div>
    <div id="settings" class="screen"><h2>設定</h2><div id="settingsRows" class="grid"></div><div class="row" style="margin-top:18px"><button data-go="menu">返回主選單</button></div></div>
    <div id="select" class="screen"><h2>關卡選擇</h2><div id="levelGrid" class="level-grid"></div><div class="row" style="margin-top:18px"><button data-go="menu">返回主選單</button></div></div>
    <div id="leaderboard" class="screen"><h2>排行榜</h2><div id="leaderboardRows" class="leaderboard"></div><div class="row" style="margin-top:18px"><button data-go="menu">返回主選單</button></div></div>
  </section>
  <section id="gameFrame">
    <div class="hud"><div id="hudLevel"></div><div class="center" id="hudLives"></div><div class="right" id="hudScore"></div><button id="homeButton" class="hud-home">主畫面</button></div>
    <div class="canvas-wrap"><canvas id="gameCanvas" class="game-canvas" width="800" height="600"></canvas><div id="overlay" class="overlay"></div></div>
  </section>
</div></div>
<script src="js/config.js"></script>
<script src="js/save-system.js"></script>
<script src="js/audio-engine.js"></script>
<script src="js/music-engine.js"></script>
<script src="js/level-manager.js"></script>
<script src="js/particle-pool.js"></script>
<script src="js/power-up-system.js"></script>
<script src="js/game.js"></script>
<script src="js/renderer.js"></script>
<script src="js/input-handler.js"></script>
<script src="js/ui-manager.js"></script>
<script src="js/main.js"></script>
</body>
</html>
