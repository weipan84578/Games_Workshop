<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>cloudbound test runner</title>
    <link rel="stylesheet" href="test-runner.css" />
  </head>
  <body>
    <main class="runner-shell">
      <header class="runner-header">
        <div>
          <p class="runner-kicker">cloudbound / quality deck</p>
          <h1>瀏覽器單元測試</h1>
          <p>不需要套件或 server。這個頁面使用與遊戲相同的離線模組。</p>
        </div>
        <div class="runner-actions">
          <button
            id="run-all"
            class="runner-button runner-primary"
            type="button"
          >
            全部執行
          </button>
          <select id="module-filter" aria-label="測試模組">
            <option value="all">全部模組</option>
          </select>
        </div>
      </header>
      <section class="runner-summary" aria-live="polite">
        <div><span>總數</span><strong id="total-count">0</strong></div>
        <div class="summary-pass">
          <span>通過</span><strong id="pass-count">0</strong>
        </div>
        <div class="summary-fail">
          <span>失敗</span><strong id="fail-count">0</strong>
        </div>
        <div><span>耗時</span><strong id="duration">0 ms</strong></div>
      </section>
      <section
        id="test-results"
        class="test-results"
        aria-live="polite"
      ></section>
    </main>
