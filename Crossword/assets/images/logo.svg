<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-labelledby="title desc">
  <title id="title">Crossword logo</title>
  <desc id="desc">A compact crossword board with highlighted cells.</desc>
  <rect width="120" height="120" rx="18" fill="#0077B6"/>
  <g transform="translate(18 18)">
    <rect width="84" height="84" rx="8" fill="#111820"/>
    <g fill="#fff">
      <rect x="4" y="4" width="22" height="22"/>
      <rect x="29" y="4" width="22" height="22"/>
      <rect x="54" y="4" width="22" height="22"/>
      <rect x="4" y="29" width="22" height="22"/>
      <rect x="29" y="29" width="22" height="22" fill="#FFE169"/>
      <rect x="54" y="29" width="22" height="22"/>
      <rect x="29" y="54" width="22" height="22"/>
      <rect x="54" y="54" width="22" height="22"/>
    </g>
    <g font-family="Arial, sans-serif" font-size="22" font-weight="900" text-anchor="middle" fill="#10212B">
      <text x="15" y="23">C</text>
      <text x="40" y="23">R</text>
      <text x="65" y="23">W</text>
      <text x="15" y="48">O</text>
      <text x="40" y="48">S</text>
      <text x="65" y="48">D</text>
      <text x="40" y="73">S</text>
      <text x="65" y="73">A</text>
    </g>
  </g>
</svg>
