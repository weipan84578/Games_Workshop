<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0a0e1a">
    <title>光槍特訓 Shooting Game</title>
    <link rel="stylesheet" href="style/reset.css">
    <link rel="stylesheet" href="style/theme.css">
    <link rel="stylesheet" href="style/ui.css">
    <link rel="stylesheet" href="style/animations.css">
  </head>
  <body>
    <main id="app" class="app-shell">
      <section id="screen-menu" class="screen screen-menu is-active" aria-labelledby="game-title">
        <div class="city-skyline" aria-hidden="true"></div>
        <button id="mute-button" class="icon-button top-right" type="button" aria-label="切換靜音">🔊</button>
        <div class="menu-panel">
          <p class="kicker">ARCADE POLICE TRAINING</p>
          <h1 id="game-title" class="game-title">光槍特訓</h1>
          <nav class="menu-actions" aria-label="主選單">
            <button class="primary-action" data-screen="stage-select" type="button">🎮 開始遊戲</button>
            <button data-screen="settings" type="button">⚙️ 設定</button>
            <button data-screen="leaderboard" type="button">🏆 排行榜</button>
            <button data-screen="help" type="button">❓ 說明</button>
          </nav>
        </div>
        <span class="version">v1.0</span>
      </section>

      <section id="screen-stage-select" class="screen" aria-labelledby="stage-title">
        <header class="screen-header">
          <button class="back-button" data-screen="menu" type="button">←</button>
          <h2 id="stage-title">關卡選擇</h2>
        </header>
        <div id="stage-list" class="stage-grid"></div>
      </section>

      <section id="screen-settings" class="screen" aria-labelledby="settings-title">
        <header class="screen-header">
          <button class="back-button" data-screen="menu" type="button">←</button>
          <h2 id="settings-title">設定</h2>
        </header>
        <form class="settings-form">
          <label>
            <span>音樂音量</span>
            <input id="music-volume" type="range" min="0" max="100" value="45">
          </label>
          <label>
            <span>音效音量</span>
            <input id="sfx-volume" type="range" min="0" max="100" value="70">
          </label>
          <fieldset>
            <legend>難度</legend>
            <div class="segmented">
              <button type="button" data-difficulty="easy">簡單</button>
              <button type="button" data-difficulty="normal" class="is-selected">普通</button>
              <button type="button" data-difficulty="hard">困難</button>
            </div>
          </fieldset>
          <fieldset>
            <legend>語言</legend>
            <div class="segmented">
              <button type="button" data-language="zh" class="is-selected">中文</button>
              <button type="button" data-language="en">English</button>
            </div>
          </fieldset>
          <label class="toggle-row">
            <span>血花特效</span>
            <input id="fx-enabled" type="checkbox" checked>
          </label>
        </form>
      </section>

      <section id="screen-leaderboard" class="screen" aria-labelledby="leaderboard-title">
        <header class="screen-header">
          <button class="back-button" data-screen="menu" type="button">←</button>
          <h2 id="leaderboard-title">排行榜</h2>
        </header>
        <ol id="leaderboard-list" class="leaderboard-list"></ol>
      </section>

      <section id="screen-help" class="screen" aria-labelledby="help-title">
        <header class="screen-header">
          <button class="back-button" data-screen="menu" type="button">←</button>
          <h2 id="help-title">說明</h2>
        </header>
        <div class="help-layout">
          <p>點擊或觸控目標射擊。命中敵人得分，誤傷人質扣分並中斷連擊。</p>
          <p>按 <kbd>R</kbd> 或右鍵換彈；行動裝置可按右下角換彈鈕，雙指觸控也會換彈。</p>
          <p>倒數結束、生命歸零或消滅本關目標後會進入結算。</p>
        </div>
      </section>

      <section id="screen-gameplay" class="screen screen-gameplay" aria-label="遊戲畫面">
        <div id="game-field" class="game-field" role="application" aria-label="射擊區域">
          <div id="scene-backdrop" class="scene-backdrop"></div>
          <div class="hud hud-top">
            <button id="pause-button" class="icon-button" type="button" aria-label="暫停">⏸</button>
            <span id="hud-lives" class="hud-pill">❤️❤️❤️</span>
            <span id="hud-stage" class="hud-pill">STAGE 1</span>
            <span id="hud-time" class="hud-pill timer">00:00</span>
            <span id="hud-combo" class="hud-pill combo">💥 x0</span>
          </div>
          <div id="target-layer" class="target-layer"></div>
          <div id="fx-layer" class="fx-layer"></div>
          <div class="hud hud-bottom">
            <span id="hud-ammo" class="ammo-box">🔫 <b></b> <em>0/0</em></span>
            <span id="hud-score" class="hud-pill score">🎯 000,000</span>
          </div>
          <button id="reload-button" class="reload-button" type="button">↻</button>
          <div id="reload-meter" class="reload-meter" aria-hidden="true"><span></span></div>
          <div id="orientation-hint" class="orientation-hint">建議旋轉為橫向遊玩</div>
        </div>
      </section>

      <section id="screen-result" class="screen result-screen" aria-labelledby="result-title">
        <div class="result-panel">
          <h2 id="result-title">任務結算</h2>
          <p id="result-status" class="result-status"></p>
          <dl id="result-stats" class="result-stats"></dl>
          <label class="player-name">
            <span>玩家名稱</span>
            <input id="player-name" maxlength="12" value="PLAYER">
          </label>
          <div class="result-actions">
            <button id="retry-button" type="button">重試</button>
            <button id="next-stage-button" class="primary-action" type="button">下一關</button>
            <button data-screen="stage-select" type="button">關卡選擇</button>
            <button data-screen="menu" type="button">主畫面</button>
          </div>
        </div>
      </section>

      <div id="pause-overlay" class="pause-overlay" hidden>
        <div class="pause-panel">
          <h2>暫停</h2>
          <button id="resume-button" class="primary-action" type="button">繼續</button>
          <button data-screen="stage-select" type="button">關卡選擇</button>
          <button data-screen="menu" type="button">主畫面</button>
        </div>
      </div>
    </main>

    <script src="js/storage.js"></script>
    <script src="js/stage.js"></script>
    <script src="js/state.js"></script>
    <script src="js/score.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/fx.js"></script>
    <script src="js/enemy.js"></script>
    <script src="js/player.js"></script>
    <script src="js/screen.js"></script>
    <script src="js/game.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
