<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>中國跳棋 | Chinese Checkers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #f3efe6;
      --surface: #fffdf8;
      --surface-2: #ebe2d3;
      --text: #2d2925;
      --muted: #6f655b;
      --border: rgba(41, 34, 25, .18);
      --accent: #b86f38;
      --accent-2: #2b7a78;
      --danger: #c63f32;
      --red: #d9573b;
      --blue: #2d82d8;
      --green: #31995b;
      --yellow: #d1a018;
      --shadow: 0 14px 36px rgba(32, 25, 16, .13);
      --font-base: 19px;
    }
    body.dark {
      --bg: #171613;
      --surface: #24211d;
      --surface-2: #312d27;
      --text: #eee5d7;
      --muted: #b9aa99;
      --border: rgba(255, 255, 255, .16);
      --accent: #d28a4b;
      --accent-2: #61b7b3;
      --shadow: 0 14px 36px rgba(0, 0, 0, .35);
    }
    html { font-size: var(--font-base); }
    body {
      margin: 0;
      min-height: 100dvh;
      background:
        radial-gradient(circle at 15% 8%, rgba(184,111,56,.16), transparent 24rem),
        radial-gradient(circle at 85% 0%, rgba(43,122,120,.14), transparent 22rem),
        var(--bg);
      color: var(--text);
      font-family: "Noto Sans TC", system-ui, -apple-system, "Microsoft JhengHei", sans-serif;
      line-height: 1.55;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    button, select, input { font: inherit; }
    .screen {
      display: none;
      min-height: 100dvh;
      padding: max(18px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom));
    }
    .screen.active { display: flex; }
    .stack { width: min(960px, 100%); margin: auto; display: grid; gap: 18px; }
    #screen-title { align-items: center; justify-content: center; text-align: center; }
    .brand-board {
      width: min(360px, 82vw);
      aspect-ratio: 1;
      margin: 0 auto 8px;
      filter: drop-shadow(0 18px 22px rgba(42, 31, 22, .16));
    }
    h1, h2, h3, p { margin: 0; }
    h1 { font-size: clamp(2.5rem, 7vw, 4.2rem); letter-spacing: 0; line-height: 1; }
    h2 { font-size: clamp(1.5rem, 4vw, 2.15rem); }
    h3 { font-size: 1.05rem; }
    .subtitle { color: var(--muted); font-weight: 500; }
    .btn {
      min-height: 52px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: .72em 1.15em;
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 0 rgba(255,255,255,.25) inset;
      cursor: pointer;
      transition: transform .1s ease, background .16s ease, border-color .16s ease;
    }
    .btn:hover { border-color: color-mix(in srgb, var(--accent), var(--border) 45%); }
    .btn:active { transform: translateY(1px) scale(.99); }
    .btn.primary { background: var(--accent); color: #fff; border-color: transparent; }
    .btn.ghost { background: transparent; box-shadow: none; }
    .btn.icon { width: 52px; padding: 0; display: inline-grid; place-items: center; }
    .btn.small { min-height: 42px; padding: .45em .8em; font-size: .9rem; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    .panel {
      background: color-mix(in srgb, var(--surface), transparent 3%);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 18px;
    }
    .setup-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    .choice {
      min-height: 94px;
      text-align: left;
      display: grid;
      align-content: center;
      gap: 4px;
    }
    .choice.active { outline: 3px solid color-mix(in srgb, var(--accent), transparent 50%); border-color: var(--accent); }
    .choice b { display: block; }
    .choice span { color: var(--muted); font-size: .88rem; }
    .form-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .form-row:last-child { border-bottom: 0; }
    .seg { display: inline-flex; gap: 4px; padding: 4px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface-2); }
    .seg button { min-height: 38px; border: 0; border-radius: 6px; background: transparent; padding: .35em .75em; color: var(--text); cursor: pointer; }
    .seg button.active { background: var(--surface); box-shadow: 0 1px 5px rgba(0,0,0,.12); }
    input[type="range"] { accent-color: var(--accent); inline-size: min(240px, 48vw); }
    select { min-height: 42px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); padding: 0 12px; }
    #screen-game {
      padding: 0;
      flex-direction: column;
      overflow: hidden;
    }
    #top-nav {
      min-height: 62px;
      padding: max(8px, env(safe-area-inset-top)) 12px 8px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface), transparent 4%);
      backdrop-filter: blur(14px);
    }
    .game-title { text-align: center; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #players-bar {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface-2), transparent 20%);
    }
    .player-info {
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      padding: 8px;
      display: grid;
      gap: 5px;
      font-size: .85rem;
    }
    .player-info.current { outline: 3px solid color-mix(in srgb, var(--accent), transparent 55%); }
    .player-head { display: flex; align-items: center; gap: 6px; min-width: 0; }
    .dot { width: 13px; height: 13px; border-radius: 50%; flex: none; border: 1px solid rgba(0,0,0,.2); }
    .player-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 700; }
    .meta { color: var(--muted); font-size: .78rem; white-space: nowrap; }
    .aggro { height: 8px; border-radius: 999px; background: color-mix(in srgb, var(--border), transparent 20%); overflow: hidden; }
    .aggro > i { display: block; height: 100%; width: 0%; border-radius: inherit; background: var(--green); transition: width .3s; }
    #board-wrap {
      flex: 1;
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 10px;
    }
    canvas {
      max-width: 100%;
      max-height: 100%;
      border-radius: 8px;
      background: linear-gradient(160deg, color-mix(in srgb, var(--surface), #fff 12%), color-mix(in srgb, var(--surface-2), #fff 5%));
      box-shadow: var(--shadow);
      touch-action: none;
    }
    #hint-bar {
      min-height: 74px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 10px 12px max(10px, env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      background: var(--surface);
      text-align: center;
    }
    #hint-text { max-width: 850px; }
    #screen-result, #screen-setup, #screen-settings { align-items: center; justify-content: center; }
    .result-mark { font-size: clamp(3rem, 14vw, 6rem); line-height: 1; }
    .rules {
      color: var(--muted);
      text-align: left;
      display: grid;
      gap: 8px;
    }
    .sr { position: absolute; inline-size: 1px; block-size: 1px; overflow: hidden; clip: rect(0 0 0 0); }
    @media (max-width: 760px) {
      .setup-grid { grid-template-columns: 1fr; }
      #players-bar { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      #top-nav { grid-template-columns: auto 1fr auto; }
      .hide-mobile { display: none; }
      .screen { padding-inline: 12px; }
      .panel { padding: 14px; }
      #hint-bar { align-items: stretch; flex-direction: column; }
    }
  </style>
</head>
<body>
  <section id="screen-title" class="screen active">
    <div class="stack">
      <canvas id="title-art" class="brand-board" width="420" height="420" aria-hidden="true"></canvas>
      <div>
        <h1>中國跳棋</h1>
        <p class="subtitle">Chinese Checkers</p>
      </div>
      <div class="actions">
        <button class="btn primary" id="new-game-btn">開始遊戲</button>
        <button class="btn" data-screen="settings">設定</button>
        <button class="btn" id="rules-btn">規則</button>
      </div>
      <div class="panel rules" id="rules-panel" hidden>
        <p>Homecoming：把自己的 10 顆棋全部移到對角目標營地即獲勝。</p>
        <p>Capture：跳過敵方棋子會吃掉它，最後仍有棋子的玩家獲勝。</p>
        <p>點選棋子後選擇亮起的位置移動。跳躍後可連跳，也可按「結束連跳」。</p>
      </div>
    </div>
  </section>

  <section id="screen-setup" class="screen">
    <div class="stack">
      <div>
        <h2>遊戲設定</h2>
        <p class="subtitle">你控制紅色，其餘玩家由 AI 操作。</p>
      </div>
      <div class="panel">
        <h3>模式</h3>
        <div class="setup-grid" data-choice="mode">
          <button class="btn choice active" data-value="homecoming"><b>回家模式</b><span>經典中國跳棋，抵達對角營地。</span></button>
          <button class="btn choice" data-value="capture"><b>吃子模式</b><span>跳過敵棋即可捕獲，直到只剩一方。</span></button>
        </div>
      </div>
      <div class="panel">
        <h3>玩家數</h3>
        <div class="setup-grid" data-choice="players">
          <button class="btn choice active" data-value="2"><b>2 人</b><span>1 位玩家 + 1 位 AI。</span></button>
          <button class="btn choice" data-value="3"><b>3 人</b><span>1 位玩家 + 2 位 AI，啟用仇恨值。</span></button>
          <button class="btn choice" data-value="4"><b>4 人</b><span>1 位玩家 + 3 位 AI，完整混戰。</span></button>
        </div>
      </div>
      <div class="panel">
        <h3>AI 難度</h3>
        <div class="setup-grid" data-choice="difficulty">
          <button class="btn choice active" data-value="easy"><b>簡單</b><span>反應 800ms，偏隨機。</span></button>
          <button class="btn choice" data-value="normal"><b>普通</b><span>反應 600ms，會評估局勢。</span></button>
          <button class="btn choice" data-value="hard"><b>困難</b><span>反應 400ms，使用淺層搜尋。</span></button>
        </div>
      </div>
      <div class="actions">
        <button class="btn ghost" data-screen="title">返回</button>
        <button class="btn primary" id="start-btn">開始</button>
      </div>
    </div>
  </section>

  <section id="screen-game" class="screen">
    <nav id="top-nav">
      <button class="btn icon" id="back-title" title="回主選單" aria-label="回主選單">←</button>
      <div class="game-title">中國跳棋</div>
      <div class="actions">
        <button class="btn icon" id="restart-btn" title="重新開始" aria-label="重新開始">↻</button>
        <button class="btn icon" data-screen="settings" title="設定" aria-label="設定">⚙</button>
      </div>
    </nav>
    <div id="players-bar"></div>
    <main id="board-wrap">
      <canvas id="board" width="640" height="640" aria-label="中國跳棋棋盤"></canvas>
    </main>
    <footer id="hint-bar">
      <span id="hint-text">選擇一顆紅棋開始。</span>
      <button class="btn small" id="end-chain-btn" hidden>結束連跳</button>
    </footer>
  </section>

  <section id="screen-result" class="screen">
    <div class="stack panel" style="text-align:center">
      <div class="result-mark" id="result-mark">勝</div>
      <h2 id="result-title">你贏了</h2>
      <p class="subtitle" id="result-summary"></p>
      <div class="actions">
        <button class="btn primary" id="again-btn">再玩一次</button>
        <button class="btn" data-screen="title">主選單</button>
      </div>
    </div>
  </section>

  <section id="screen-settings" class="screen">
    <div class="stack">
      <div>
        <h2>設定</h2>
        <p class="subtitle">音量與顯示偏好會保存在這台裝置。</p>
      </div>
      <div class="panel">
        <div class="form-row">
          <label for="music-volume">背景音樂</label>
          <input id="music-volume" type="range" min="0" max="100">
        </div>
        <div class="form-row">
          <label for="sfx-volume">音效</label>
          <input id="sfx-volume" type="range" min="0" max="100">
        </div>
        <div class="form-row">
          <span>背景音樂靜音</span>
          <button class="btn small" id="music-muted">關</button>
        </div>
        <div class="form-row">
          <span>音效靜音</span>
          <button class="btn small" id="sfx-muted">關</button>
        </div>
        <div class="form-row">
          <label for="font-size">字體大小</label>
          <select id="font-size">
            <option value="S">S</option>
            <option value="M">M</option>
            <option value="L">L</option>
            <option value="XL">XL</option>
          </select>
        </div>
        <div class="form-row">
          <span>深色模式</span>
          <button class="btn small" id="dark-mode">自動</button>
        </div>
        <div class="form-row">
          <span>顯示仇恨值</span>
          <button class="btn small" id="show-aggro">開</button>
        </div>
        <div class="form-row">
          <span>提示合法步</span>
          <button class="btn small" id="show-hints">開</button>
        </div>
      </div>
      <div class="actions">
        <button class="btn primary" id="settings-back">完成</button>
      </div>
    </div>
  </section>

  <script>
    const HEX_DIRECTIONS = [[1,0],[-1,0],[0,1],[0,-1],[1,-1],[-1,1]];
    const PLAYER_ORDER = ["red", "blue", "green", "yellow"];
    const PLAYER_META = {
      red: { label: "玩家", short: "紅", color: "#d9573b", zone: "top" },
      blue: { label: "AI 藍", short: "藍", color: "#2d82d8", zone: "bottom" },
      green: { label: "AI 綠", short: "綠", color: "#31995b", zone: "left" },
      yellow: { label: "AI 黃", short: "黃", color: "#d1a018", zone: "right" }
    };
    const OPPOSITE = { red: "blue", blue: "red", green: "yellow", yellow: "green" };
    const FONT_SCALES = { S: "15px", M: "17px", L: "19px", XL: "22px" };
    const DIFFICULTY = {
      easy: { delay: 800, depth: 1, beam: 6, random: .38 },
      normal: { delay: 600, depth: 1, beam: 8, random: .14 },
      hard: { delay: 400, depth: 2, beam: 8, random: .04 }
    };

    const settings = {
      musicVolume: .7,
      sfxVolume: .8,
      musicMuted: false,
      sfxMuted: false,
      fontSize: "L",
      darkMode: "auto",
      showAggro: true,
      showHints: true
    };
    const setup = { mode: "homecoming", players: 2, difficulty: "easy" };
    const boardCanvas = document.getElementById("board");
    const ctx = boardCanvas.getContext("2d");
    const titleCanvas = document.getElementById("title-art");
    const titleCtx = titleCanvas.getContext("2d");

    let audioCtx = null;
    let bgmTimer = null;
    let bgmGain = null;
    let lastScreen = "title";
    let animationTick = 0;
    let game = null;
    let aiTimer = null;
    let cellLayout = new Map();
    let boardNodes = [];
    let boardSet = new Set();
    let zones = null;

    function key(q, r) { return q + "," + r; }
    function parseKey(pos) { const [q, r] = pos.split(",").map(Number); return { q, r }; }
    function add(a, d, n = 1) { return key(a.q + d[0] * n, a.r + d[1] * n); }
    function hexDistance(aKey, bKey) {
      const a = typeof aKey === "string" ? parseKey(aKey) : aKey;
      const b = typeof bKey === "string" ? parseKey(bKey) : bKey;
      return (Math.abs(a.q - b.q) + Math.abs(a.q + a.r - b.q - b.r) + Math.abs(a.r - b.r)) / 2;
    }
    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function starContains(q, r) {
      const s = -q - r;
      const abs = [Math.abs(q), Math.abs(r), Math.abs(s)].sort((a, b) => a - b);
      return abs[2] <= 8 && abs[1] <= 4;
    }

    function triangle(zone) {
      const cells = [];
      for (let q = -8; q <= 8; q++) {
        for (let r = -8; r <= 8; r++) {
          if (!starContains(q, r)) continue;
          const s = -q - r;
          if (zone === "top" && r < -4) cells.push(key(q, r));
          if (zone === "bottom" && r > 4) cells.push(key(q, r));
          if (zone === "left" && q < -4) cells.push(key(q, r));
          if (zone === "right" && q > 4) cells.push(key(q, r));
          if (zone === "upperLeft" && s > 4) cells.push(key(q, r));
          if (zone === "lowerRight" && s < -4) cells.push(key(q, r));
        }
      }
      return cells.sort((a, b) => {
        const pa = parseKey(a), pb = parseKey(b);
        return pa.r - pb.r || pa.q - pb.q;
      });
    }

    function generateBoard() {
      const all = new Set();
      for (let q = -4; q <= 4; q++) {
        for (let r = -8; r <= 8; r++) {
          if (starContains(q, r)) all.add(key(q, r));
        }
      }
      for (let q = -8; q <= 8; q++) {
        for (let r = -8; r <= 8; r++) {
          if (starContains(q, r)) all.add(key(q, r));
        }
      }
      boardNodes = [...all].map(p => ({ pos: p, ...parseKey(p) }));
      boardSet = all;
      zones = {
        red: triangle("top"),
        blue: triangle("bottom"),
        green: triangle("left"),
        yellow: triangle("right")
      };
    }

    function makeBoard(players) {
      const board = {};
      boardNodes.forEach(n => board[n.pos] = { piece: null });
      players.forEach(id => {
        zones[id].forEach(pos => board[pos].piece = { playerId: id, color: PLAYER_META[id].color });
      });
      return board;
    }

    function activePlayers(count) {
      if (count === 2) return ["red", "blue"];
      if (count === 3) return ["red", "blue", "green"];
      return ["red", "blue", "green", "yellow"];
    }

    function targetZone(playerId) { return zones[OPPOSITE[playerId]] || zones.red; }
    function targetCenter(playerId) {
      const cells = targetZone(playerId);
      const sum = cells.reduce((acc, p) => {
        const n = parseKey(p);
        acc.q += n.q; acc.r += n.r;
        return acc;
      }, { q: 0, r: 0 });
      return { q: sum.q / cells.length, r: sum.r / cells.length };
    }

    function newGame() {
      clearTimeout(aiTimer);
      const players = activePlayers(setup.players);
      game = {
        mode: setup.mode,
        difficulty: setup.difficulty,
        players,
        board: makeBoard(players),
        turn: 0,
        round: 1,
        selected: null,
        legal: [],
        chainCell: null,
        phase: "idle",
        aggro: Object.fromEntries(players.map(p => [p, 0])),
        captures: Object.fromEntries(players.map(p => [p, 0])),
        gameOver: false,
        winner: null,
        startedAt: Date.now()
      };
      showScreen("game");
      resizeCanvas();
      updatePlayers();
      updateHint();
      draw();
      ensureMusic();
      maybeAiTurn();
    }

    function currentPlayer() { return game.players[game.turn % game.players.length]; }
    function isHumanTurn() { return currentPlayer() === "red" && game.phase !== "ai-thinking"; }
    function getPieces(board, playerId) {
      return Object.keys(board).filter(pos => board[pos].piece && board[pos].piece.playerId === playerId);
    }

    function getLegalMoves(pos, board = game.board, mode = game.mode, chainOnly = false, playerId = null) {
      const piece = board[pos] && board[pos].piece;
      const mover = playerId || (piece && piece.playerId);
      if (!mover) return [];
      const origin = parseKey(pos);
      const moves = [];
      if (!chainOnly) {
        HEX_DIRECTIONS.forEach(d => {
          const dest = add(origin, d);
          if (boardSet.has(dest) && board[dest] && !board[dest].piece) {
            moves.push({ from: pos, to: dest, jump: false, capture: null });
          }
        });
      }
      HEX_DIRECTIONS.forEach(d => {
        const mid = add(origin, d);
        const land = add(origin, d, 2);
        if (!boardSet.has(land) || !board[mid] || !board[land]) return;
        const midPiece = board[mid].piece;
        if (!midPiece || board[land].piece) return;
        const isEnemy = midPiece.playerId !== mover;
        if (mode === "capture" && !isEnemy) return;
        moves.push({ from: pos, to: land, jump: true, capture: mode === "capture" && isEnemy ? mid : null });
      });
      return moves;
    }

    function allMoves(board, playerId, mode) {
      const moves = [];
      getPieces(board, playerId).forEach(pos => moves.push(...getLegalMoves(pos, board, mode, false, playerId)));
      return moves;
    }

    function applyMove(move, real = true) {
      const board = real ? game.board : cloneBoard(game.board);
      const piece = board[move.from].piece;
      board[move.from].piece = null;
      board[move.to].piece = piece;
      if (move.capture) board[move.capture].piece = null;
      return board;
    }

    function cloneBoard(board) {
      const out = {};
      Object.keys(board).forEach(pos => {
        out[pos] = { piece: board[pos].piece ? { ...board[pos].piece } : null };
      });
      return out;
    }

    function handleClick(x, y) {
      if (!game || game.gameOver || !isHumanTurn()) return;
      ensureAudioCtx();
      const pos = clickedNode(x, y);
      if (!pos) return;
      const player = currentPlayer();
      if (game.selected && game.legal.some(m => m.to === pos)) {
        const move = game.legal.find(m => m.to === pos);
        moveHuman(move);
        return;
      }
      if (game.chainCell) {
        hint("必須從目前棋子繼續連跳，或結束連跳。");
        sfx("tap");
        return;
      }
      const piece = game.board[pos].piece;
      if (!piece || piece.playerId !== player) {
        hint("請選擇自己的紅棋。");
        sfx("tap");
        return;
      }
      selectPiece(pos);
    }

    function selectPiece(pos, chainOnly = false) {
      game.selected = pos;
      game.legal = getLegalMoves(pos, game.board, game.mode, chainOnly);
      game.phase = "selected";
      if (!game.legal.length) hint(chainOnly ? "這顆棋沒有後續跳躍，可結束連跳。" : "這顆棋目前沒有合法步。");
      else hint("選擇亮起的位置移動。");
      sfx("tap");
      draw();
    }

    function moveHuman(move) {
      doMove(move, "red");
      if (move.jump) {
        const jumps = getLegalMoves(move.to, game.board, game.mode, true);
        if (jumps.length) {
          game.chainCell = move.to;
          game.selected = move.to;
          game.legal = jumps;
          game.phase = "chaining";
          document.getElementById("end-chain-btn").hidden = false;
          hint("可以繼續連跳，或結束連跳。");
          updatePlayers();
          draw();
          return;
        }
      }
      finishTurn();
    }

    function doMove(move, playerId) {
      applyMove(move, true);
      if (move.capture) {
        game.captures[playerId]++;
        adjustAggro(playerId, 8);
        adjustAggro(game.board[move.to].piece.playerId, 5);
        sfx("capture");
      } else if (move.jump) {
        adjustAggro(playerId, 3);
        sfx("jump");
      } else {
        sfx("move");
      }
      if (targetZone(playerId).includes(move.to)) adjustAggro(playerId, 2);
    }

    function finishTurn() {
      document.getElementById("end-chain-btn").hidden = true;
      game.selected = null;
      game.legal = [];
      game.chainCell = null;
      game.phase = "idle";
      if (checkGameOver()) return;
      advanceTurn();
      updatePlayers();
      updateHint();
      draw();
      maybeAiTurn();
    }

    function advanceTurn() {
      let advanced = 0;
      do {
        game.turn = (game.turn + 1) % game.players.length;
        if (game.turn === 0) {
          game.round++;
          decayAggro();
        }
        advanced++;
      } while (
        game.mode === "capture" &&
        advanced <= game.players.length &&
        getPieces(game.board, currentPlayer()).length === 0
      );
    }

    function endChain() {
      if (!game || !game.chainCell || !isHumanTurn()) return;
      finishTurn();
    }

    function adjustAggro(playerId, amount) {
      if (!game || !game.aggro[playerId]) game.aggro[playerId] = 0;
      game.aggro[playerId] = clamp(game.aggro[playerId] + amount, 0, 100);
    }
    function decayAggro() {
      game.players.forEach(p => game.aggro[p] = clamp(game.aggro[p] - 2, 0, 100));
    }

    function checkGameOver() {
      let winner = null;
      if (game.mode === "homecoming") {
        winner = game.players.find(p => targetZone(p).every(pos => game.board[pos].piece && game.board[pos].piece.playerId === p));
      } else {
        const alive = game.players.filter(p => getPieces(game.board, p).length > 0);
        if (alive.length === 1) winner = alive[0];
      }
      if (!winner) return false;
      game.gameOver = true;
      game.winner = winner;
      updatePlayers();
      draw();
      sfx(winner === "red" ? "win" : "lose");
      setTimeout(() => showResult(winner), 800);
      return true;
    }

    function maybeAiTurn() {
      if (!game || game.gameOver || currentPlayer() === "red") return;
      game.phase = "ai-thinking";
      updateHint();
      draw();
      const player = currentPlayer();
      const d = DIFFICULTY[game.difficulty];
      aiTimer = setTimeout(() => aiTakeTurn(player), d.delay);
    }

    function aiTakeTurn(playerId) {
      if (!game || game.gameOver || currentPlayer() !== playerId) return;
      const chain = [];
      let move = chooseAiMove(playerId, game.board, false);
      if (!move) {
        finishTurn();
        return;
      }
      doMove(move, playerId);
      chain.push(move);
      let guard = 0;
      while (move.jump && guard++ < 10) {
        const jumps = getLegalMoves(move.to, game.board, game.mode, true, playerId);
        if (!jumps.length || Math.random() < .18) break;
        move = chooseBestFrom(jumps, playerId, game.board, 1);
        doMove(move, playerId);
        chain.push(move);
      }
      hint(PLAYER_META[playerId].label + " 移動了 " + chain.length + " 步。");
      finishTurn();
    }

    function chooseAiMove(playerId, board, chainOnly) {
      const d = DIFFICULTY[game.difficulty];
      const moves = allMoves(board, playerId, game.mode).filter(m => !chainOnly || m.jump);
      if (!moves.length) return null;
      if (Math.random() < d.random) return shuffle(moves)[0];
      return chooseBestFrom(moves, playerId, board, d.depth);
    }

    function chooseBestFrom(moves, playerId, board, depth) {
      const scored = moves.map(m => ({ move: m, score: scoreMove(m, playerId, board) }))
        .sort((a, b) => b.score - a.score)
        .slice(0, DIFFICULTY[game.difficulty].beam);
      if (depth <= 1) return scored[0].move;
      let best = scored[0];
      scored.forEach(item => {
        const next = cloneBoard(board);
        const piece = next[item.move.from].piece;
        next[item.move.from].piece = null;
        next[item.move.to].piece = piece;
        if (item.move.capture) next[item.move.capture].piece = null;
        const replyPenalty = game.players.filter(p => p !== playerId)
          .reduce((sum, p) => sum + Math.max(0, ...allMoves(next, p, game.mode).map(m => scoreMove(m, p, next))) * .18, 0);
        item.score += evaluate(next, playerId) - replyPenalty;
        if (item.score > best.score) best = item;
      });
      return best.move;
    }

    function scoreMove(move, playerId, board) {
      const target = targetCenter(playerId);
      const before = hexDistance(move.from, target);
      const after = hexDistance(move.to, target);
      let score = (before - after) * 10;
      if (move.jump) score += 6;
      if (move.capture) score += 28;
      if (targetZone(playerId).includes(move.to)) score += 16;
      if (game.players.length >= 3) {
        const prey = aggroTarget(playerId);
        const preyPieces = getPieces(board, prey);
        if (preyPieces.length) {
          const nearestBefore = Math.min(...preyPieces.map(p => hexDistance(move.from, p)));
          const nearestAfter = Math.min(...preyPieces.map(p => hexDistance(move.to, p)));
          score += (nearestBefore - nearestAfter) * (game.aggro[prey] >= 30 ? 4 : 1.5);
          if (move.capture && board[move.capture].piece && board[move.capture].piece.playerId === prey) score += 18;
        }
      }
      return score + Math.random() * 2;
    }

    function aggroTarget(playerId) {
      return game.players.filter(p => p !== playerId).sort((a, b) => {
        const sa = (game.aggro[a] || 0) * .6 + winProximity(a) * .4;
        const sb = (game.aggro[b] || 0) * .6 + winProximity(b) * .4;
        return sb - sa;
      })[0];
    }

    function winProximity(playerId) {
      if (game.mode === "capture") return 100 - getPieces(game.board, playerId).length * 7;
      const target = targetCenter(playerId);
      const pieces = getPieces(game.board, playerId);
      const maxDist = 16 * pieces.length || 1;
      const dist = pieces.reduce((sum, p) => sum + hexDistance(p, target), 0);
      return clamp(100 - dist / maxDist * 100, 0, 100);
    }

    function evaluate(board, playerId) {
      if (game.mode === "capture") {
        const my = getPieces(board, playerId).length;
        const enemies = game.players.filter(p => p !== playerId).map(p => getPieces(board, p).length);
        return my * 15 - Math.max(...enemies, 0) * 7 - (game.aggro[playerId] || 0) * .35;
      }
      const target = targetCenter(playerId);
      return getPieces(board, playerId).reduce((score, pos) => {
        score -= hexDistance(pos, target) * 4;
        if (targetZone(playerId).includes(pos)) score += 22;
        return score;
      }, -(game.aggro[playerId] || 0) * .3);
    }

    function resizeCanvas() {
      const isMobile = window.innerWidth < 700;
      const top = document.getElementById("top-nav").offsetHeight;
      const players = document.getElementById("players-bar").offsetHeight;
      const hint = document.getElementById("hint-bar").offsetHeight;
      const availableH = Math.max(320, window.innerHeight - top - players - hint - 26);
      const size = isMobile ? Math.min(Math.floor(window.innerWidth * .96), availableH) : Math.min(650, Math.floor(window.innerWidth * .66), availableH);
      const dpr = window.devicePixelRatio || 1;
      boardCanvas.style.width = size + "px";
      boardCanvas.style.height = size + "px";
      boardCanvas.width = Math.floor(size * dpr);
      boardCanvas.height = Math.floor(size * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      layoutCells(size);
      draw();
    }

    function layoutCells(size) {
      cellLayout.clear();
      const pad = size * .075;
      const coords = boardNodes.map(n => axialToPixel(n.q, n.r, 1));
      const minX = Math.min(...coords.map(p => p.x));
      const maxX = Math.max(...coords.map(p => p.x));
      const minY = Math.min(...coords.map(p => p.y));
      const maxY = Math.max(...coords.map(p => p.y));
      const scale = Math.min((size - pad * 2) / (maxX - minX), (size - pad * 2) / (maxY - minY));
      boardNodes.forEach(n => {
        const p = axialToPixel(n.q, n.r, scale);
        cellLayout.set(n.pos, {
          x: p.x - minX * scale + pad,
          y: p.y - minY * scale + pad,
          r: Math.max(9, scale * .31)
        });
      });
    }

    function axialToPixel(q, r, scale) {
      return { x: scale * Math.sqrt(3) * (q + r / 2), y: scale * 1.5 * r };
    }

    function draw() {
      if (!ctx || !cellLayout.size) return;
      const size = parseFloat(boardCanvas.style.width) || 640;
      ctx.clearRect(0, 0, size, size);
      animationTick += .016;
      drawStar(size);
      drawHighlights();
      drawCells();
      drawPieces();
      if (game && game.gameOver) drawOverlay(size);
    }

    function drawStar(size) {
      ctx.save();
      ctx.globalAlpha = document.body.classList.contains("dark") ? .22 : .32;
      Object.keys(zones || {}).forEach(id => {
        ctx.fillStyle = PLAYER_META[id].color;
        ctx.beginPath();
        zones[id].forEach((pos, i) => {
          const p = cellLayout.get(pos);
          if (!p) return;
          if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
        });
        ctx.closePath();
        ctx.fill();
      });
      ctx.restore();
    }

    function drawCells() {
      boardNodes.forEach(n => {
        const p = cellLayout.get(n.pos);
        const inTarget = game && targetZone(currentPlayer()).includes(n.pos);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * .55, 0, Math.PI * 2);
        ctx.fillStyle = inTarget ? "rgba(184,111,56,.22)" : "rgba(122, 105, 83, .20)";
        ctx.fill();
        ctx.lineWidth = 1;
        ctx.strokeStyle = "rgba(70, 53, 35, .22)";
        ctx.stroke();
      });
    }

    function drawHighlights() {
      if (!game || !settings.showHints) return;
      if (game.selected) {
        const p = cellLayout.get(game.selected);
        if (p) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r * 1.45, 0, Math.PI * 2);
          ctx.strokeStyle = "rgba(184,111,56,.88)";
          ctx.lineWidth = 4;
          ctx.stroke();
        }
      }
      game.legal.forEach(m => {
        const p = cellLayout.get(m.to);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * (m.jump ? 1.1 : .95), 0, Math.PI * 2);
        ctx.fillStyle = m.capture ? "rgba(198,63,50,.38)" : "rgba(43,122,120,.34)";
        ctx.fill();
        ctx.strokeStyle = m.jump ? "rgba(43,122,120,.92)" : "rgba(43,122,120,.65)";
        ctx.lineWidth = 3;
        ctx.stroke();
      });
    }

    function drawPieces() {
      if (!game) return;
      Object.keys(game.board).forEach(pos => {
        const piece = game.board[pos].piece;
        if (!piece) return;
        const p = cellLayout.get(pos);
        const pulse = game.selected === pos ? Math.sin(Date.now() / 160) * 1.2 : 0;
        ctx.save();
        ctx.shadowColor = "rgba(0,0,0,.28)";
        ctx.shadowBlur = 8;
        ctx.shadowOffsetY = 4;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r + 2 + pulse, 0, Math.PI * 2);
        ctx.fillStyle = piece.color;
        ctx.fill();
        ctx.shadowColor = "transparent";
        const grad = ctx.createRadialGradient(p.x - p.r * .32, p.y - p.r * .42, 1, p.x, p.y, p.r + 3);
        grad.addColorStop(0, "rgba(255,255,255,.62)");
        grad.addColorStop(.45, "rgba(255,255,255,.05)");
        grad.addColorStop(1, "rgba(0,0,0,.25)");
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.lineWidth = 1.5;
        ctx.strokeStyle = "rgba(0,0,0,.28)";
        ctx.stroke();
        ctx.restore();
      });
    }

    function drawOverlay(size) {
      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,.24)";
      ctx.fillRect(0, 0, size, size);
      ctx.fillStyle = "#fff";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = "700 34px Noto Sans TC, sans-serif";
      ctx.fillText(game.winner === "red" ? "勝利" : "落敗", size / 2, size / 2);
      ctx.restore();
    }

    function clickedNode(x, y) {
      let best = null;
      let bestDist = Infinity;
      cellLayout.forEach((p, pos) => {
        const d = Math.hypot(x - p.x, y - p.y);
        if (d < bestDist) { bestDist = d; best = { pos, r: p.r }; }
      });
      return best && bestDist <= Math.max(24, best.r * 1.8) ? best.pos : null;
    }

    function updatePlayers() {
      if (!game) return;
      const bar = document.getElementById("players-bar");
      bar.innerHTML = "";
      game.players.forEach(p => {
        const info = document.createElement("div");
        info.className = "player-info" + (currentPlayer() === p ? " current" : "");
        const count = getPieces(game.board, p).length;
        const aggro = game.aggro[p] || 0;
        const aggroColor = aggro >= 70 ? "var(--danger)" : aggro >= 30 ? "var(--yellow)" : "var(--green)";
        info.innerHTML = `
          <div class="player-head"><i class="dot" style="background:${PLAYER_META[p].color}"></i><span class="player-name">${PLAYER_META[p].label}</span></div>
          <div class="meta">棋 ${count}　吃 ${game.captures[p] || 0}</div>
          ${settings.showAggro && game.players.length >= 3 ? `<div class="meta">仇恨 ${aggro}${aggro >= 70 ? " !!" : aggro >= 30 ? " !" : ""}</div><div class="aggro"><i style="width:${aggro}%;background:${aggroColor}"></i></div>` : ""}
        `;
        bar.appendChild(info);
      });
    }

    function updateHint() {
      if (!game) return;
      const p = currentPlayer();
      if (game.phase === "ai-thinking") hint(PLAYER_META[p].label + " 思考中...");
      else if (p === "red") hint("輪到你。選擇紅棋移動。");
      else hint("輪到 " + PLAYER_META[p].label + "。");
    }

    function hint(text) { document.getElementById("hint-text").textContent = text; }

    function showResult(winner) {
      const isWin = winner === "red";
      document.getElementById("result-mark").textContent = isWin ? "勝" : "敗";
      document.getElementById("result-title").textContent = isWin ? "你贏了" : PLAYER_META[winner].label + " 獲勝";
      document.getElementById("result-summary").textContent = "模式：" + (game.mode === "homecoming" ? "回家模式" : "吃子模式") + "，回合：" + game.round + "。";
      showScreen("result");
    }

    function showScreen(name) {
      document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      document.getElementById("screen-" + name).classList.add("active");
      if (name !== "settings") lastScreen = name;
      if (name === "game") setTimeout(resizeCanvas, 0);
      if (name === "title") drawTitleArt();
    }

    function bindChoices() {
      document.querySelectorAll("[data-choice]").forEach(group => {
        group.addEventListener("click", e => {
          const btn = e.target.closest(".choice");
          if (!btn) return;
          group.querySelectorAll(".choice").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          const type = group.dataset.choice;
          setup[type] = type === "players" ? Number(btn.dataset.value) : btn.dataset.value;
          sfx("tap");
        });
      });
    }

    function loadSettings() {
      try {
        const saved = localStorage.getItem("cc_settings");
        if (saved) Object.assign(settings, JSON.parse(saved));
      } catch (e) {}
    }
    function saveSettings() {
      try { localStorage.setItem("cc_settings", JSON.stringify(settings)); } catch (e) {}
    }
    function applySettings() {
      document.documentElement.style.setProperty("--font-base", FONT_SCALES[settings.fontSize] || FONT_SCALES.L);
      const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      document.body.classList.toggle("dark", settings.darkMode === "on" || (settings.darkMode === "auto" && prefersDark));
      document.getElementById("music-volume").value = Math.round(settings.musicVolume * 100);
      document.getElementById("sfx-volume").value = Math.round(settings.sfxVolume * 100);
      document.getElementById("music-muted").textContent = settings.musicMuted ? "開" : "關";
      document.getElementById("sfx-muted").textContent = settings.sfxMuted ? "開" : "關";
      document.getElementById("font-size").value = settings.fontSize;
      document.getElementById("dark-mode").textContent = settings.darkMode === "auto" ? "自動" : settings.darkMode === "on" ? "開" : "關";
      document.getElementById("show-aggro").textContent = settings.showAggro ? "開" : "關";
      document.getElementById("show-hints").textContent = settings.showHints ? "開" : "關";
      if (bgmGain) bgmGain.gain.value = settings.musicMuted ? 0 : settings.musicVolume * .16;
      updatePlayers();
      draw();
    }

    function ensureAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();
      return audioCtx;
    }
    function ensureMusic() {
      if (settings.musicMuted || bgmTimer) return;
      const ac = ensureAudioCtx();
      bgmGain = bgmGain || ac.createGain();
      bgmGain.gain.value = settings.musicVolume * .16;
      bgmGain.connect(ac.destination);
      const notes = [261.63, 293.66, 329.63, 392, 440, 392, 329.63, 293.66];
      let i = 0;
      bgmTimer = setInterval(() => {
        if (settings.musicMuted || !audioCtx) return;
        tone(notes[i++ % notes.length], .18, "sine", bgmGain, .16);
      }, 540);
    }
    function tone(freq, dur, type = "sine", destination = null, vol = 1) {
      if (settings.sfxMuted && !destination) return;
      const ac = ensureAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.setValueAtTime((destination ? 1 : settings.sfxVolume) * vol, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(.001, ac.currentTime + dur);
      osc.connect(gain).connect(destination || ac.destination);
      osc.start();
      osc.stop(ac.currentTime + dur);
    }
    function noise(dur, vol) {
      if (settings.sfxMuted) return;
      const ac = ensureAudioCtx();
      const buffer = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
      const data = buffer.getChannelData(0);
      let last = 0;
      for (let i = 0; i < data.length; i++) {
        last = (last + .035 * (Math.random() * 2 - 1)) / 1.035;
        data[i] = last * 3.2;
      }
      const source = ac.createBufferSource();
      const filter = ac.createBiquadFilter();
      const gain = ac.createGain();
      source.buffer = buffer;
      filter.type = "lowpass";
      filter.frequency.value = 430;
      gain.gain.setValueAtTime(settings.sfxVolume * vol, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(.001, ac.currentTime + dur);
      source.connect(filter).connect(gain).connect(ac.destination);
      source.start();
    }
    function sfx(name) {
      if (name === "tap") tone(660, .06, "triangle", null, .12);
      if (name === "move") noise(.12, .55);
      if (name === "jump") { tone(580, .08, "triangle", null, .25); setTimeout(() => tone(820, .09, "triangle", null, .2), 60); }
      if (name === "capture") { tone(210, .22, "sawtooth", null, .22); noise(.18, .45); }
      if (name === "win") [523, 659, 784, 1046].forEach((n, i) => setTimeout(() => tone(n, .22, "sine", null, .28), i * 120));
      if (name === "lose") [440, 330, 247].forEach((n, i) => setTimeout(() => tone(n, .28, "triangle", null, .25), i * 160));
    }

    function drawTitleArt() {
      const c = titleCanvas, t = titleCtx;
      const size = c.width;
      t.clearRect(0, 0, size, size);
      const center = size / 2;
      t.save();
      t.translate(center, center);
      t.fillStyle = getComputedStyle(document.body).getPropertyValue("--surface");
      t.beginPath();
      t.arc(0, 0, 190, 0, Math.PI * 2);
      t.fill();
      t.strokeStyle = getComputedStyle(document.body).getPropertyValue("--border");
      t.lineWidth = 3;
      t.stroke();
      const colors = ["#d9573b", "#2d82d8", "#31995b", "#d1a018"];
      for (let ring = 0; ring < 5; ring++) {
        for (let i = 0; i < 6 + ring * 6; i++) {
          const a = i / (6 + ring * 6) * Math.PI * 2 + ring * .18;
          const r = 18 + ring * 31;
          t.beginPath();
          t.arc(Math.cos(a) * r, Math.sin(a) * r, 8 + ring * .4, 0, Math.PI * 2);
          t.fillStyle = colors[(i + ring) % colors.length];
          t.globalAlpha = .88;
          t.fill();
        }
      }
      t.globalAlpha = 1;
      t.restore();
    }

    function initEvents() {
      bindChoices();
      document.querySelectorAll("[data-screen]").forEach(btn => btn.addEventListener("click", () => showScreen(btn.dataset.screen)));
      document.getElementById("new-game-btn").addEventListener("click", () => showScreen("setup"));
      document.getElementById("start-btn").addEventListener("click", newGame);
      document.getElementById("again-btn").addEventListener("click", newGame);
      document.getElementById("restart-btn").addEventListener("click", newGame);
      document.getElementById("back-title").addEventListener("click", () => {
        clearTimeout(aiTimer);
        showScreen("title");
      });
      document.getElementById("rules-btn").addEventListener("click", () => {
        const panel = document.getElementById("rules-panel");
        panel.hidden = !panel.hidden;
      });
      document.getElementById("end-chain-btn").addEventListener("click", endChain);
      document.getElementById("settings-back").addEventListener("click", () => {
        saveSettings();
        showScreen(lastScreen || "title");
      });
      document.getElementById("music-volume").addEventListener("input", e => { settings.musicVolume = Number(e.target.value) / 100; applySettings(); saveSettings(); ensureMusic(); });
      document.getElementById("sfx-volume").addEventListener("input", e => { settings.sfxVolume = Number(e.target.value) / 100; applySettings(); saveSettings(); });
      document.getElementById("music-muted").addEventListener("click", () => { settings.musicMuted = !settings.musicMuted; applySettings(); saveSettings(); });
      document.getElementById("sfx-muted").addEventListener("click", () => { settings.sfxMuted = !settings.sfxMuted; applySettings(); saveSettings(); });
      document.getElementById("font-size").addEventListener("change", e => { settings.fontSize = e.target.value; applySettings(); saveSettings(); resizeCanvas(); });
      document.getElementById("dark-mode").addEventListener("click", () => {
        settings.darkMode = settings.darkMode === "auto" ? "on" : settings.darkMode === "on" ? "off" : "auto";
        applySettings(); saveSettings(); drawTitleArt();
      });
      document.getElementById("show-aggro").addEventListener("click", () => { settings.showAggro = !settings.showAggro; applySettings(); saveSettings(); });
      document.getElementById("show-hints").addEventListener("click", () => { settings.showHints = !settings.showHints; applySettings(); saveSettings(); });
      boardCanvas.addEventListener("click", e => {
        const rect = boardCanvas.getBoundingClientRect();
        const scaleX = parseFloat(boardCanvas.style.width) / rect.width;
        const scaleY = parseFloat(boardCanvas.style.height) / rect.height;
        handleClick((e.clientX - rect.left) * scaleX, (e.clientY - rect.top) * scaleY);
      });
      boardCanvas.addEventListener("touchstart", e => {
        e.preventDefault();
        const touch = e.touches[0];
        const rect = boardCanvas.getBoundingClientRect();
        const scaleX = parseFloat(boardCanvas.style.width) / rect.width;
        const scaleY = parseFloat(boardCanvas.style.height) / rect.height;
        handleClick((touch.clientX - rect.left) * scaleX, (touch.clientY - rect.top) * scaleY);
      }, { passive: false });
      window.addEventListener("resize", () => {
        clearTimeout(window.__ccResize);
        window.__ccResize = setTimeout(() => { resizeCanvas(); drawTitleArt(); }, 150);
      });
      document.addEventListener("visibilitychange", () => {
        if (document.hidden && audioCtx) audioCtx.suspend();
        if (!document.hidden && audioCtx) audioCtx.resume();
      });
    }

    function init() {
      generateBoard();
      loadSettings();
      initEvents();
      applySettings();
      drawTitleArt();
      showScreen("title");
    }

    window.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
