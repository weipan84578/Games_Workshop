<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>五子棋 Gomoku</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="app">
    <section id="screen-main" class="screen main-screen active" aria-label="主選單">
      <h1 class="title">五子棋</h1>
      <p class="subtitle">黑子先行，連成五子即勝。挑戰不同強度的 AI，保留悔棋、音效、主題與戰績。</p>
      <div class="menu-actions">
        <button id="btn-start" class="btn btn-primary">開始對局</button>
        <button id="btn-settings" class="btn btn-secondary">設定</button>
      </div>
      <div class="footer-line">版本 1.0.0 | Web Audio 已就緒</div>
    </section>

    <section id="screen-game" class="screen" aria-label="棋局">
      <div class="game-shell">
        <div class="info-bar">
          <div class="player-box"><span class="stone-mark black"></span><span>你：黑子</span></div>
          <div id="turn-badge" class="turn-badge">輪到你</div>
          <div class="player-box right"><span>AI：白子</span><span class="stone-mark white"></span></div>
        </div>
        <div class="board-wrap">
          <canvas id="game-canvas" width="720" height="720" aria-label="五子棋棋盤"></canvas>
          <div id="thinking-layer" class="thinking-layer">AI 思考中...</div>
        </div>
        <div class="bottom-bar">
          <div id="game-stats" class="stats-line">步數 0 | 00:00 | 悔棋 3</div>
          <button id="btn-undo" class="icon-btn" title="悔棋" aria-label="悔棋">↶</button>
          <button id="btn-pause" class="icon-btn" title="暫停" aria-label="暫停">Ⅱ</button>
        </div>
      </div>
    </section>

    <section id="screen-settings" class="screen settings-screen" aria-label="設定">
      <h2 class="screen-title">設定</h2>
      <div class="setting-row">
        <div class="setting-label">AI 難度</div>
        <div class="segmented" data-setting="difficulty">
          <button data-value="easy">簡單</button>
          <button data-value="normal">普通</button>
          <button data-value="hard">困難</button>
        </div>
      </div>
      <div class="setting-row">
        <div class="setting-label">背景音量</div>
        <div class="slider-line">
          <input id="bgm-volume" type="range" min="0" max="100" step="1">
          <span id="bgm-value" class="range-value">50%</span>
        </div>
      </div>
      <div class="setting-row">
        <div class="setting-label">音效音量</div>
        <div class="slider-line">
          <input id="sfx-volume" type="range" min="0" max="100" step="1">
          <span id="sfx-value" class="range-value">80%</span>
        </div>
      </div>
      <div class="setting-row">
        <div class="setting-label">介面主題</div>
        <div class="segmented two" data-setting="theme">
          <button data-value="light">淺色</button>
          <button data-value="dark">深色</button>
        </div>
      </div>
      <div class="screen-actions">
        <button id="btn-save-settings" class="btn btn-primary">儲存設定</button>
        <button id="btn-back-main" class="btn btn-secondary">回主選單</button>
      </div>
    </section>

    <section id="screen-result" class="screen result-screen" aria-label="結果">
      <h2 id="result-title" class="result-title">勝負已定</h2>
      <p id="result-message" class="result-message">對局結束</p>
      <div class="result-stats">
        <div>對局時間 <span id="result-time">00:00</span></div>
        <div>總步數 <span id="result-moves">0</span></div>
        <div>你的戰績 <span id="result-record">0 勝 / 0 敗 / 0 和</span></div>
      </div>
      <div class="screen-actions">
        <button id="btn-play-again" class="btn btn-primary">再來一局</button>
        <button id="btn-result-main" class="btn btn-secondary">回主選單</button>
      </div>
    </section>
  </main>

  <div id="pause-modal" class="pause-modal" role="dialog" aria-modal="true" aria-label="暫停">
    <div class="pause-panel">
      <h2>已暫停</h2>
      <div class="pause-actions">
        <button id="btn-resume" class="btn btn-primary">繼續</button>
        <button id="btn-restart" class="btn btn-secondary">重新開始</button>
        <button id="btn-pause-main" class="btn btn-secondary">回主選單</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="js/main.js" defer></script>
</body>
</html>
